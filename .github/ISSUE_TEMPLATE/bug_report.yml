name: Bug report
description: Report a reproducible software bug
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, config files, seeds, and input data assumptions.
      placeholder: |
        1. Run ...
        2. With config ...
        3. Seed ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, commit SHA, dependency versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
