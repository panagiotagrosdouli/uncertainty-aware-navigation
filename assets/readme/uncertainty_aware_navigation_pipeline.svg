<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Uncertainty-Aware Navigation research pipeline</title>
  <desc id="desc">Conceptual pipeline from uncertain environment observations through belief, uncertainty, risk, recoverability, planning, and runtime supervision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#102f46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#50e3c2"/>
      <stop offset="100%" stop-color="#67a9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7fc8ff"/>
    </marker>
  </defs>
  <rect width="1600" height="820" rx="30" fill="url(#bg)"/>
  <circle cx="1450" cy="80" r="190" fill="#173c5d" opacity="0.34"/>
  <circle cx="120" cy="760" r="220" fill="#0e4e4c" opacity="0.23"/>

  <text x="800" y="70" text-anchor="middle" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="700">Uncertainty-Aware Navigation</text>
  <text x="800" y="112" text-anchor="middle" fill="#bad0e3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22">From incomplete environmental knowledge to auditable navigation decisions</text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" width="250" height="270" rx="24" fill="#102d49" stroke="#4d7ca4" stroke-width="2"/>
    <rect x="370" y="210" width="250" height="270" rx="24" fill="#12374a" stroke="#4b8c97" stroke-width="2"/>
    <rect x="670" y="210" width="250" height="270" rx="24" fill="#143c43" stroke="#48a79a" stroke-width="2"/>
    <rect x="970" y="210" width="250" height="270" rx="24" fill="#16384a" stroke="#5a95bd" stroke-width="2"/>
    <rect x="1270" y="210" width="260" height="270" rx="24" fill="#173149" stroke="#6aa9dc" stroke-width="2"/>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="195" y="252" text-anchor="middle" fill="#95d8ff" font-size="17" font-weight="700" letter-spacing="1.1">ENVIRONMENT</text>
    <rect x="115" y="287" width="160" height="110" rx="12" fill="#0a2035" stroke="#65a7ff" stroke-width="3"/>
    <path d="M135 373 L135 315 L165 315 L165 345 L205 345 L205 300 L255 300 L255 373" fill="none" stroke="#50e3c2" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="181" cy="362" r="9" fill="#ffd166"/>
    <text x="195" y="430" text-anchor="middle" fill="#f5f9fd" font-size="23" font-weight="700">Partial observations</text>
    <text x="195" y="458" text-anchor="middle" fill="#b7c9da" font-size="17">Unknown cells • noise</text>

    <text x="495" y="252" text-anchor="middle" fill="#92e5dc" font-size="17" font-weight="700" letter-spacing="1.1">BELIEF LAYER</text>
    <g transform="translate(427 290)">
      <rect width="136" height="108" rx="10" fill="#0c2732" stroke="#50e3c2" stroke-width="3"/>
      <g fill="#2d5260"><rect x="12" y="12" width="30" height="30"/><rect x="52" y="12" width="30" height="30"/><rect x="92" y="12" width="30" height="30"/><rect x="12" y="52" width="30" height="30"/><rect x="52" y="52" width="30" height="30"/><rect x="92" y="52" width="30" height="30"/></g>
      <rect x="52" y="12" width="30" height="30" fill="#67a9ff"/><rect x="92" y="52" width="30" height="30" fill="#ffd166"/>
    </g>
    <text x="495" y="430" text-anchor="middle" fill="#f5f9fd" font-size="23" font-weight="700">Occupancy belief</text>
    <text x="495" y="458" text-anchor="middle" fill="#b7c9da" font-size="17">Uncertainty field U(x)</text>

    <text x="795" y="252" text-anchor="middle" fill="#93efd8" font-size="17" font-weight="700" letter-spacing="1.1">SAFETY FIELDS</text>
    <path d="M724 373 C742 318,770 296,795 340 C818 379,847 373,870 304" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <line x1="722" y1="385" x2="873" y2="385" stroke="#587281" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="795" y="430" text-anchor="middle" fill="#f5f9fd" font-size="23" font-weight="700">Risk &amp; recoverability</text>
    <text x="795" y="458" text-anchor="middle" fill="#b7c9da" font-size="17">R(x) • Γ(x)</text>

    <text x="1095" y="252" text-anchor="middle" fill="#9fd4ff" font-size="17" font-weight="700" letter-spacing="1.1">PLANNING</text>
    <circle cx="1060" cy="340" r="15" fill="#50e3c2"/>
    <circle cx="1140" cy="305" r="15" fill="#ffd166"/>
    <path d="M1060 340 C1080 290,1110 372,1140 305" fill="none" stroke="#67a9ff" stroke-width="7" stroke-linecap="round"/>
    <text x="1095" y="430" text-anchor="middle" fill="#f5f9fd" font-size="23" font-weight="700">Candidate trajectories</text>
    <text x="1095" y="458" text-anchor="middle" fill="#b7c9da" font-size="17">Dijkstra • A* • aware A*</text>

    <text x="1400" y="252" text-anchor="middle" fill="#a7d8ff" font-size="17" font-weight="700" letter-spacing="1.1">SUPERVISION</text>
    <circle cx="1400" cy="338" r="52" fill="#0a2137" stroke="#67a9ff" stroke-width="4"/>
    <path d="M1372 341 L1392 360 L1431 313" fill="none" stroke="#50e3c2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1400" y="430" text-anchor="middle" fill="#f5f9fd" font-size="23" font-weight="700">Runtime decision</text>
    <text x="1400" y="458" text-anchor="middle" fill="#b7c9da" font-size="17">Normal • caution • reroute • stop</text>
  </g>

  <g stroke="#7fc8ff" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="320" y1="345" x2="357" y2="345"/>
    <line x1="620" y1="345" x2="657" y2="345"/>
    <line x1="920" y1="345" x2="957" y2="345"/>
    <line x1="1220" y1="345" x2="1257" y2="345"/>
  </g>

  <rect x="140" y="560" width="1320" height="150" rx="24" fill="#0a1d30" stroke="#294f6c" stroke-width="2"/>
  <text x="800" y="605" text-anchor="middle" fill="#f5f9fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="700">Research objective</text>
  <text x="800" y="648" text-anchor="middle" fill="#c0d3e4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21">Minimize path cost while explicitly accounting for uncertainty exposure, traversal risk, and retained recovery capacity.</text>
  <text x="800" y="688" text-anchor="middle" fill="#7f99ae" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Conceptual overview — synthetic research prototype, not experimental evidence or a certified safety guarantee</text>
</svg>